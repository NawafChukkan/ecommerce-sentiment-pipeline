services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecom_sentiment}
      POSTGRES_USER: ${POSTGRES_USER:-ecom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecom_user} -d ${POSTGRES_DB:-ecom_sentiment}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app:
    build:
      context: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ecom_user:ecom_password@postgres:5432/ecom_sentiment}
      POSTGRES_DB: ${POSTGRES_DB:-ecom_sentiment}
      POSTGRES_USER: ${POSTGRES_USER:-ecom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom_password}
      BLOB_ENDPOINT: ${BLOB_ENDPOINT:-http://minio:9000}
      BLOB_ACCESS_KEY: ${BLOB_ACCESS_KEY:-minioadmin}
      BLOB_SECRET_KEY: ${BLOB_SECRET_KEY:-minioadmin123}
      BLOB_REGION: ${BLOB_REGION:-us-east-1}
      BLOB_BUCKET: ${BLOB_BUCKET:-ecom-sentiment-raw}
      BLOB_RAW_PREFIX: ${BLOB_RAW_PREFIX:-source}
      BLOB_USE_SSL: ${BLOB_USE_SSL:-false}
      RAW_DATA_DIR: ${RAW_DATA_DIR:-/app/data/raw}
      SYNC_DATA_DIR: ${SYNC_DATA_DIR:-/app/data/synced}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-local[*]}
      SEED_PROFILE: ${SEED_PROFILE:-demo}
      SEED_TARGET_SIZE_GB: ${SEED_TARGET_SIZE_GB:-1.5}
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "src.ecom_lifecycle.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres-data:
  minio-data:
